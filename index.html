<style>
  :root {
    --cream: #f5efe6; --ink: #1a1208; --terracotta: #c45c2e;
    --gold: #d4a843; --sage: #7a8c6e; --warm-gray: #8c7d6e;
    --card-bg: #faf6f0; --line: rgba(26,18,8,0.12); --done-bg: rgba(122,140,110,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; overflow-x: hidden; }

  header { position: relative; background: var(--ink); color: var(--cream); padding: 56px 24px 32px; overflow: hidden; }
  header::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 80% at 80% 20%, rgba(212,168,67,0.18) 0%, transparent 60%), radial-gradient(ellipse 50% 60% at 10% 90%, rgba(196,92,46,0.15) 0%, transparent 55%); }
  .header-inner { position: relative; z-index: 1; }
  .city-label { font-size: 11px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  header h1 { font-family: 'Playfair Display', serif; font-size: clamp(38px, 10vw, 56px); font-weight: 400; line-height: 1; margin-bottom: 4px; }
  header h1 em { font-style: italic; color: var(--gold); }
  .header-sub { font-size: 13px; color: rgba(245,239,230,0.5); margin-top: 12px; font-weight: 300; }
  .progress-wrap { margin-top: 24px; display: flex; align-items: center; gap: 12px; }
  .progress-bar-outer { flex: 1; height: 3px; background: rgba(245,239,230,0.15); border-radius: 2px; overflow: hidden; }
  .progress-bar-inner { height: 100%; background: linear-gradient(90deg, var(--terracotta), var(--gold)); border-radius: 2px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); width: 0%; }
  .progress-label { font-size: 12px; color: rgba(245,239,230,0.6); white-space: nowrap; min-width: 60px; text-align: right; }

  .tab-nav { position: sticky; top: 0; z-index: 100; background: var(--ink); display: flex; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid rgba(245,239,230,0.08); padding: 0 16px; -webkit-overflow-scrolling: touch; }
  .tab-nav::-webkit-scrollbar { display: none; }
  .tab-btn { flex-shrink: 0; padding: 14px 16px; background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(245,239,230,0.4); transition: color 0.2s; position: relative; white-space: nowrap; }
  .tab-btn.active { color: var(--cream); }
  .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 16px; height: 2px; background: var(--gold); border-radius: 1px; }
  .tab-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--terracotta); margin-left: 5px; vertical-align: middle; opacity: 0; transition: opacity 0.2s; }
  .tab-dot.has-done { opacity: 1; }

  main { padding: 0 0 80px; }
  .day-section { display: none; }
  .day-section.active { display: block; }

  .day-hero { padding: 24px 24px 16px; border-bottom: 1px solid var(--line); }
  .day-number { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--warm-gray); margin-bottom: 4px; }
  .day-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; line-height: 1.25; color: var(--ink); }
  .day-narrative { margin-top: 8px; font-size: 13px; color: var(--warm-gray); line-height: 1.6; font-weight: 300; }
  .day-progress { margin-top: 16px; display: flex; align-items: center; gap: 10px; }
  .day-progress-bar { flex: 1; height: 2px; background: var(--line); border-radius: 1px; overflow: hidden; }
  .day-progress-fill { height: 100%; background: var(--sage); border-radius: 1px; transition: width 0.5s ease; width: 0%; }
  .day-progress-text { font-size: 11px; color: var(--warm-gray); white-space: nowrap; }

  .stops-list { padding: 8px 16px 16px; }
  .stop-card { background: var(--card-bg); border: 1px solid var(--line); border-radius: 12px; margin-top: 10px; overflow: hidden; transition: transform 0.15s ease, opacity 0.3s ease; cursor: pointer; -webkit-user-select: none; user-select: none; }
  .stop-card:active { transform: scale(0.985); }
  .stop-card.done { background: var(--done-bg); border-color: rgba(122,140,110,0.2); }
  .stop-card.done .stop-name { text-decoration: line-through; color: var(--warm-gray); }
  .stop-card.done .stop-type, .stop-card.done .stop-notes { opacity: 0.5; }

  .stop-inner { display: flex; align-items: flex-start; gap: 14px; padding: 16px; }
  .stop-check { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--line); background: white; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; margin-top: 1px; }
  .stop-card.done .stop-check { background: var(--sage); border-color: var(--sage); }
  .stop-check svg { display: none; }
  .stop-card.done .stop-check svg { display: block; }

  .stop-body { flex: 1; min-width: 0; }
  .stop-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .stop-name { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; line-height: 1.3; color: var(--ink); transition: color 0.2s; }
  .stop-time { font-size: 11px; color: var(--terracotta); font-weight: 500; white-space: nowrap; margin-top: 2px; }
  .stop-type { display: inline-block; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--warm-gray); margin-top: 4px; }
  .stop-notes { font-size: 12.5px; color: var(--warm-gray); line-height: 1.55; margin-top: 8px; font-weight: 300; border-top: 1px solid var(--line); padding-top: 10px; }

  .type-museum .stop-type { color: #7a5c8c; }
  .type-market .stop-type { color: var(--terracotta); }
  .type-food .stop-type { color: #b8860b; }
  .type-landmark .stop-type { color: var(--ink); }
  .type-nature .stop-type { color: var(--sage); }
  .type-gallery .stop-type { color: #4a6fa5; }
  .type-beach .stop-type { color: #3a8fa5; }

  .tips-section { margin: 0 16px 8px; padding: 16px; background: rgba(212,168,67,0.08); border: 1px solid rgba(212,168,67,0.2); border-radius: 12px; }
  .tips-label { font-size: 10px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .tips-label::after { content: ''; flex: 1; height: 1px; background: rgba(212,168,67,0.2); }
  .tip-item { font-size: 12px; color: var(--warm-gray); line-height: 1.5; padding: 4px 0; font-weight: 300; }
  .tip-item + .tip-item { border-top: 1px solid rgba(212,168,67,0.1); margin-top: 4px; padding-top: 8px; }
  .tip-item strong { color: var(--ink); font-weight: 500; }

  .reset-wrap { text-align: center; padding: 24px 16px 0; }
  .reset-btn { background: none; border: 1px solid var(--line); color: var(--warm-gray); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 8px 18px; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
  .reset-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }

  .confetti-piece { position: fixed; width: 8px; height: 8px; pointer-events: none; z-index: 999; border-radius: 1px; animation: confetti-fall 1.2s ease-in forwards; }
  @keyframes confetti-fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(60vh) rotate(540deg); opacity: 0; } }

  .completion-banner { display: none; margin: 16px 16px 0; padding: 16px; background: var(--ink); border-radius: 12px; text-align: center; }
  .completion-banner.show { display: block; }
  .completion-banner h3 { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--gold); font-style: italic; }
  .completion-banner p { font-size: 12px; color: rgba(245,239,230,0.6); margin-top: 4px; }

  .install-hint { font-size: 11px; text-align: center; color: var(--warm-gray); padding: 12px 24px; opacity: 0.7; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="city-label">📍 Spain · May 2025</div>
    <h1>Vale<em>ncia</em></h1>
    <div class="header-sub">Your personal trip itinerary</div>
    <div class="progress-wrap">
      <div class="progress-bar-outer"><div class="progress-bar-inner" id="globalBar"></div></div>
      <div class="progress-label" id="globalLabel">0 of 0</div>
    </div>
  </div>
</header>

<nav class="tab-nav" id="tabNav"></nav>
<main id="mainContent"></main>
<div class="install-hint">Tap Share → Add to Home Screen to install ✦</div>

<script>
const DAYS = [
  {
    id: 'sunday', label: 'Sunday',
    title: 'Old Town Wander',
    day: 'Sunday Afternoon',
    narrative: 'A relaxed 2–3 hour loop through Ciutat Vella. Medieval core at its most atmospheric in late afternoon light.',
    tips: [
      { label: 'Central Market', text: '<strong>Closed Sundays</strong> — admire the Art Nouveau facade only.' },
      { label: 'La Lonja', text: '<strong>Closes 2pm Sundays</strong> — exterior only if arriving after.' },
      { label: 'El Micalet', text: '<strong>Closes 5:45pm</strong> — aim to be inside by 4:30pm at the latest.' },
    ],
    stops: [
      { id: 's1', time: '2:30 PM', name: 'La Lonja de la Seda', type: 'landmark', typeLabel: 'Landmark', notes: 'Closed inside on Sundays but the Gothic exterior is extraordinary. One of the finest medieval buildings in Europe.' },
      { id: 's2', time: '2:45 PM', name: 'Central Market (exterior)', type: 'market', typeLabel: 'Market', notes: 'Closed Sundays — the Art Nouveau facade is stunning. Right next door to La Lonja.' },
      { id: 's3', time: '3:00 PM', name: 'Horchatería de Santa Catalina', type: 'food', typeLabel: 'Café', notes: 'Order horchata con fartons — the essential Valencia afternoon stop. Open until 9pm.' },
      { id: 's4', time: '3:30 PM', name: 'Plaza de la Virgen', type: 'landmark', typeLabel: 'Square', notes: 'The cathedral square — beautiful in afternoon light. Wander freely.' },
      { id: 's5', time: '3:50 PM', name: 'El Micalet', type: 'landmark', typeLabel: 'Tower', notes: 'Climb the cathedral bell tower for panoramic views. €3. Closes 5:45pm — be inside by 4:30.' },
      { id: 's6', time: '4:45 PM', name: 'Plaça de l\'Ajuntament', type: 'landmark', typeLabel: 'Square', notes: 'End the afternoon at the main civic square. Plenty of bars for aperitivo hour before dinner.' },
    ]
  },
  {
    id: 'monday', label: 'Monday',
    title: 'Bellas Artes, Turia & the Arts Complex',
    day: 'All Day Monday',
    narrative: 'Start at the Museo de Bellas Artes — one of Spain\'s finest free museums, right on the Turia. Follow the riverbed east to Mercado de Colón and finish with golden hour at the City of Arts and Sciences.',
    tips: [
      { label: 'Bellas Artes', text: '<strong>Open Mondays 10am–8pm. Free.</strong> Home to Sorolla, Goya, and the world\'s best Valencian painting collection.' },
      { label: 'Turia Park', text: 'Rent a <strong>ValenBisi bike</strong> — the museum is right at the park\'s edge. Ride east to the arts complex.' },
      { label: 'Ciudad de las Artes', text: 'Arrive at <strong>golden hour</strong> for the best light on Calatrava\'s architecture. Free to wander outside.' },
    ],
    stops: [
      { id: 'm1', time: '10:00 AM', name: 'Museo de Bellas Artes San Pío V', type: 'museum', typeLabel: 'Museum', notes: 'Open Mondays 10am–8pm. Free. One of Spain\'s best collections — Sorolla, Goya, El Greco, and a superb Valencian painting gallery. Allow 2 hours.' },
      { id: 'm2', time: '12:30 PM', name: 'Jardín del Turia', type: 'nature', typeLabel: 'Park', notes: 'The museum sits right at the park entrance. Walk or bike east along the old riverbed — grab lunch nearby before you go.' },
      { id: 'm3', time: '2:30 PM', name: 'Mercado de Colón', type: 'market', typeLabel: 'Market', notes: 'Stunning Art Nouveau market in the Eixample. Open Mondays until 9pm — ideal afternoon coffee or glass of wine.' },
      { id: 'm4', time: '4:30 PM', name: 'Ciudad de las Artes y las Ciencias', type: 'landmark', typeLabel: 'Complex', notes: 'Arrive at golden hour for the best light. Free to wander the grounds. Book Oceanogràfic or Science Museum ahead if you want to go inside.' },
    ]
  },
  {
    id: 'tuesday', label: 'Tuesday',
    title: 'IVAM, Photography & the Albufera',
    day: 'All Day Tuesday',
    narrative: 'Morning at Valencia\'s premier contemporary art museum, a photography stop nearby, then head south to the Albufera for a sunset boat trip and paella.',
    tips: [
      { label: 'IVAM', text: 'Open Tues 10am–7pm. Check <strong>current entry fee</strong> on ivam.es.' },
      { label: 'La Llotgeta', text: '<strong>Free photography</strong> exhibitions, open Tuesdays. 10-min walk from IVAM.' },
      { label: 'Albufera timing', text: '<strong>Go in the afternoon</strong> — the sunset boat trip is the centrepiece. Arrive El Palmar by 4pm at the latest.' },
      { label: 'Getting there', text: '<strong>Bus 25</strong> from city centre to El Palmar (~30 mins). Book boat trip (~€5) in advance if possible.' },
    ],
    stops: [
      { id: 't1', time: '9:30 AM', name: 'Malvarrosa Beach', type: 'beach', typeLabel: 'Beach', notes: 'Start with the beach while it\'s quiet. Easy by bus or ValenBisi bike from the city centre.' },
      { id: 't2', time: '11:30 AM', name: 'IVAM — Art Modern Institute Museum', type: 'museum', typeLabel: 'Museum', notes: 'Open Tuesdays 10am–7pm. Contemporary art spanning painting, photography, and installation. Check current entry fee on ivam.es.' },
      { id: 't3', time: '1:30 PM', name: 'La Llotgeta Centro Fotográfico', type: 'gallery', typeLabel: 'Photography', notes: 'Free photography-only exhibition space, open Tuesdays. A 10-minute walk from IVAM — don\'t miss it.' },
      { id: 't4', time: '4:00 PM', name: 'Parque Natural de la Albufera', type: 'nature', typeLabel: 'Nature', notes: 'Afternoon visit is best — sunset boat trip from the pier at Mirador Pujol is the highlight. Give your name to the boatman before heading off to reserve a seat. Eat paella in El Palmar.' },
    ]
  },
  {
    id: 'friday', label: 'Friday',
    title: 'CAHH & Barrio del Carmen',
    day: 'All Day Friday',
    narrative: 'The day for the best contemporary art in the city. CAHH is unhurried, the collection is world-class, and Barrio del Carmen fills the rest of the afternoon.',
    tips: [
      { label: 'CAHH', text: 'Open Fridays 10am–8pm. <strong>Book tickets</strong> at cahh.es (~€10). Allow 2 full hours.' },
      { label: 'Aleksandra Istorik', text: 'Opens <strong>12–2pm and 5–8pm</strong> on Fridays — plan around these windows.' },
      { label: 'Vangar', text: '<strong>Closed Fridays</strong> — wander Barrio del Carmen\'s street art instead.' },
      { label: 'La Llotgeta', text: 'Open Fridays 10:30am–6:30pm — good morning add-on near the Central Market.' },
    ],
    stops: [
      { id: 'f1', time: '10:00 AM', name: 'Centro de Arte Hortensia Herrero (CAHH)', type: 'museum', typeLabel: 'Museum', notes: 'Kiefer, Tàpies, Hockney, TeamLab — in a stunning restored palace. ~€10. Book ahead. The highlight of the whole trip.' },
      { id: 'f2', time: '12:15 PM', name: 'Aleksandra Istorik Gallery', type: 'gallery', typeLabel: 'Gallery', notes: 'Open Fridays 12–2pm. Contemporary gallery where the artist works on-site. 5-min walk from CAHH.' },
      { id: 'f3', time: '2:00 PM', name: 'Barrio del Carmen wander', type: 'landmark', typeLabel: 'Neighbourhood', notes: 'Vangar is closed Fridays — explore the Carmen\'s street art, independent shops, and medieval alleyways instead.' },
      { id: 'f4', time: '3:30 PM', name: 'Mercado de Colón', type: 'market', typeLabel: 'Market', notes: 'Open Fridays until 9pm. A lovely wind-down spot — glass of wine, good people-watching, beautiful architecture.' },
      { id: 'f5', time: '5:00 PM', name: 'Aleksandra Istorik Gallery (evening)', type: 'gallery', typeLabel: 'Gallery', notes: 'Returns 5–8pm Friday. Catch the evening session if you missed lunchtime.' },
      { id: 'f6', time: '5:30 PM', name: 'Jardín del Turia — golden hour', type: 'nature', typeLabel: 'Park', notes: 'End the trip with a golden hour stroll or cycle through the riverbed park. Always open.' },
    ]
  }
];

const STORAGE_KEY = 'valencia-itinerary-v2';
let checked = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let activeDay = DAYS[0].id;

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(checked)); }
function allStopIds() { return DAYS.flatMap(d => d.stops.map(s => s.id)); }
function globalProgress() { const ids = allStopIds(); return { done: ids.filter(id => checked[id]).length, total: ids.length }; }
function dayProgress(day) { return { done: day.stops.filter(s => checked[s.id]).length, total: day.stops.length }; }

function updateGlobalBar() {
  const { done, total } = globalProgress();
  document.getElementById('globalBar').style.width = (total ? done/total*100 : 0) + '%';
  document.getElementById('globalLabel').textContent = `${done} of ${total}`;
}

function updateDayBar(dayId) {
  const day = DAYS.find(d => d.id === dayId);
  if (!day) return;
  const { done, total } = dayProgress(day);
  const fill = document.querySelector(`#day-${dayId} .day-progress-fill`);
  const text = document.querySelector(`#day-${dayId} .day-progress-text`);
  if (fill) fill.style.width = (total ? done/total*100 : 0) + '%';
  if (text) text.textContent = `${done}/${total} stops`;
  const banner = document.querySelector(`#day-${dayId} .completion-banner`);
  if (banner) banner.classList.toggle('show', done === total && total > 0);
  const dot = document.querySelector(`.tab-dot[data-day="${dayId}"]`);
  if (dot) dot.classList.toggle('has-done', done > 0);
}

function toggleStop(stopId, dayId) {
  checked[stopId] = !checked[stopId];
  save();
  const card = document.getElementById(`card-${stopId}`);
  if (card) card.classList.toggle('done', checked[stopId]);
  if (checked[stopId]) confetti(card);
  updateDayBar(dayId);
  updateGlobalBar();
}

function confetti(el) {
  if (!el) return;
  const colors = ['#d4a843','#c45c2e','#7a8c6e','#f5efe6','#1a1208'];
  const rect = el.getBoundingClientRect();
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `left:${rect.left+Math.random()*rect.width}px;top:${rect.top}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*0.3}s;animation-duration:${0.9+Math.random()*0.5}s;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1800);
  }
}

function renderNav() {
  document.getElementById('tabNav').innerHTML = DAYS.map(d => {
    const { done } = dayProgress(d);
    return `<button class="tab-btn${d.id===activeDay?' active':''}" data-day="${d.id}">${d.label}<span class="tab-dot${done>0?' has-done':''}" data-day="${d.id}"></span></button>`;
  }).join('');
  document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchDay(btn.dataset.day)));
}

function renderMain() {
  document.getElementById('mainContent').innerHTML = DAYS.map(day => {
    const { done, total } = dayProgress(day);
    const pct = total ? done/total*100 : 0;
    return `
    <div class="day-section${day.id===activeDay?' active':''}" id="day-${day.id}">
      <div class="completion-banner${done===total&&total>0?' show':''}">
        <h3>Day complete ✦</h3><p>You've visited all stops for ${day.day}</p>
      </div>
      <div class="day-hero">
        <div class="day-number">${day.day}</div>
        <div class="day-title">${day.title}</div>
        <div class="day-narrative">${day.narrative}</div>
        <div class="day-progress">
          <div class="day-progress-bar"><div class="day-progress-fill" style="width:${pct}%"></div></div>
          <div class="day-progress-text">${done}/${total} stops</div>
        </div>
      </div>
      <div class="stops-list">
        <div class="tips-section">
          <div class="tips-label">Tips for the day</div>
          ${day.tips.map(t => `<div class="tip-item"><strong>${t.label}:</strong> ${t.text}</div>`).join('')}
        </div>
        ${day.stops.map(stop => `
        <div class="stop-card type-${stop.type}${checked[stop.id]?' done':''}" id="card-${stop.id}" data-stop="${stop.id}" data-day="${day.id}">
          <div class="stop-inner">
            <div class="stop-check">
              <svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7.5L10 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="stop-body">
              <div class="stop-header">
                <div class="stop-name">${stop.name}</div>
                <div class="stop-time">${stop.time}</div>
              </div>
              <div class="stop-type">${stop.typeLabel}</div>
              <div class="stop-notes">${stop.notes}</div>
            </div>
          </div>
        </div>`).join('')}
      </div>
      <div class="reset-wrap"><button class="reset-btn" data-day="${day.id}">Reset this day</button></div>
    </div>`;
  }).join('');

  document.querySelectorAll('.stop-card').forEach(c => c.addEventListener('click', () => toggleStop(c.dataset.stop, c.dataset.day)));
  document.querySelectorAll('.reset-btn').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    DAYS.find(d => d.id === btn.dataset.day).stops.forEach(s => delete checked[s.id]);
    save(); renderAll();
  }));
}

function switchDay(dayId) {
  activeDay = dayId;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.day === dayId));
  document.querySelectorAll('.day-section').forEach(s => s.classList.toggle('active', s.id === `day-${dayId}`));
  window.scrollTo({ top: document.querySelector('.tab-nav').offsetTop, behavior: 'smooth' });
}

function renderAll() { renderNav(); renderMain(); updateGlobalBar(); }
renderAll();

if ('serviceWorker' in navigator) {
  const sw = `const C='valencia-v2';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['/']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw], {type:'application/javascript'}))).catch(()=>{});
}
</script>
</body>
</html>
